name: Day1 CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  APP_NAME: day1-cicd-refactor
  IMAGE_NAME: day1-cicd-refactor-image
  CONTAINER_PORT: 3000

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Validation
        run: echo "Build stage completed for $APP_NAME"

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME .

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  security-scan:
    name: Security Scan Stage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for committed .env file
        run: |
          if [ -f .env ]; then
            echo ".env file found - failing workflow"
            exit 1
          fi
          echo "No .env file committed"

      - name: Verify secret availability securely
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          if [ -z "$APP_SECRET" ]; then
            echo "APP_SECRET is missing"
            exit 1
          fi
          echo "APP_SECRET is configured securely"

      - name: Check for hardcoded secret pattern
        run: |
          if grep -R "day2-demo-secret-123" .; then
            echo "Hardcoded secret found in repository"
            exit 1
          fi
          echo "No hardcoded demo secret found"

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulated Deploy
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          echo "Deploying $APP_NAME from main branch only"
          echo "Secret is being used securely without printing it"